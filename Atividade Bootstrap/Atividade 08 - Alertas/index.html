<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body class="bg-light">

    <div class="alert alert-success" role="alert">
        Cadastro realizado com sucesso!
    </div>
    <div class="alert alert-danger">
        Erro ao processar!
    </div>
    <div class="alert alert-warning">
        Atenção: campo obrigatório
    </div>
    <div class="alert alert-info">
        Dica: use letras maiúscula
    </div>

    <button class="btn btn-primary">Primario</button>
    <button class="btn btn-secondary">Secundário</button>
    <button class="btn btn-success">Sucesso</button>
    <button class="btn btn-danger">Perigo</button>
    <button class="btn btn-warning">Atenção</button>
    <button class="btn btn-info">Info</button>
    <button class="btn btn-outline-primary">Borda Azul</button>
    <!-- JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+JnlVuFcGL7UOxr6GtnJMZBtH"
        crossorigin="anonymous"></script>
</body>

</html>
