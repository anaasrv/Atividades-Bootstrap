<!DOCTYPE html>
<html lang="en">
<head>

    <!-- CSS do Bootstra -->´
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" 
     rel="stylesheet" 
     integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" ´
     crossorigin="anonymous">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /*CSS para forçar o tamanho e manter a proporção da imagem*/
        .custom-img {
            width: 540px;
            height: 540px;
            object-fit: cover;
            /*Faz a imagem preencher o quadro sem esticar*/
        }
    </style>
    <title>Carrossel com Bootstrap</title>
</head>

<body>

    <div id="meuCarrossel" class="carousel slide" data-bs-ride="carousel">
        <div class="carousel-indicators">
            <button data-bs-target="#meuCarrossel" data-bs-slide-to="0" class="active"></button>
            <button data-bs-target="#meuCarrossel" data-bs-slide-to="1"></button>
            <button data-bs-target="#meuCarrossel" data-bs-slide-to="2"></button>
        </div>

        <div class="carousel-inner">
            <div class="carousel-item active">
                <img src="cavalo.jpg" class="d-block mx-auto custom-img" alt="Primeiro Slide">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Primeiro Slide</h3>
                    <p>Selfie da diva</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="cachorro.jpg" class="d-block mx-auto custom-img" alt="Segundo Slide">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Segundo Slide</h3>
                    <p>Cachorro do Denani</p>
                </div>
            </div>

            <div class="carousel-item">
                <img src="animais.jpg" class="d-block mx-auto custom-img" alt="Terceiro Slide">
                <div class="carousel-caption d-none d-md-block">
                    <h3>Terceiro Slide</h3>
                    <p>Todos juntos</p>
                </div>
            </div>
        </div>

        <button class="carousel-control-prev" data-bs-target="#meuCarrossel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#meuCarrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
        <button class="carousel-control-next" data-bs-target="#meuCarrossel" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
        </button>
    </div>

    <!-- JavaScript do Bootstrap -->
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" 
     integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" 
     crossorigin="anonymous"></script>
     
</body>
</html>
